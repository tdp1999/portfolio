<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>console</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      CSP Notes:
      - 'unsafe-inline' in script-src required for Angular inline scripts and CF analytics
      - 'unsafe-inline' in style-src required by Tailwind and boot spinner
      - frame-ancestors is set via helmet on the API (meta tags don't support it)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        connect-src 'self' http://localhost:3000 https://dashboard-api-production-d76d.up.railway.app https://accounts.google.com https://cloudflareinsights.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        frame-src https://accounts.google.com;
        object-src 'none';
        base-uri 'self';
      "
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <console-root>
      <!-- Shown until Angular bootstraps; replaced automatically -->
      <style>
        .boot-spinner {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
        }
        .boot-spinner div {
          width: 40px;
          height: 40px;
          border: 3px solid #e5e7eb;
          border-top-color: #3b82f6;
          border-radius: 50%;
          animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="boot-spinner"><div></div></div>
    </console-root>
  </body>
</html>
