<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Preload above-the-fold web fonts so text renders in the final face from first paint
         (avoids FOUT swap from system fallbacks). Self-hosted in /public/fonts/. -->
    <link rel="preload" href="/fonts/newsreader-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/newsreader-latin-400-italic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/newsreader-latin-500-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-500-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-600-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Baseline critical CSS — guarantees correct font-family + bg before main stylesheet
         loads. Beasties only inlines critical CSS for prerendered routes (index.csr.html);
         SSR runtime routes (`/`, `/projects`, etc.) use index.server.html which has no
         inline critical CSS. Without these few rules, hero text flashes from browser
         default serif → Inter when styles arrive (visible on prod via Cloudflare). -->
    <style>
      html,
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        background-color: #0d0e11;
        color: #e3e2e6;
        margin: 0;
      }
      /* data-theme is set on <html> itself by the inline script below — so the
         selector must be `html[data-theme='light']`, NOT `[data-theme='light'] html`
         (the latter looks for an html descendant, which never exists since html is
         the root). Same fix applies to body via the descendant combinator. */
      html[data-theme='light'],
      html[data-theme='light'] body {
        background-color: #faf9fd;
        color: #1a1b1f;
      }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
      // No-FOUC theme bootstrap. Runs before paint, before Angular bootstrap.
      // Order: cookie → localStorage → system preference → dark default.
      (function () {
        try {
          var t = null;
          var m = document.cookie.match(/(?:^|;\s*)landing_theme=(dark|light)/);
          if (m) t = m[1];
          if (!t) {
            var ls = localStorage.getItem('landing_theme');
            if (ls === 'dark' || ls === 'light') t = ls;
          }
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          var root = document.documentElement;
          root.setAttribute('data-theme', t);
          if (t === 'dark') root.classList.add('dark');
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
