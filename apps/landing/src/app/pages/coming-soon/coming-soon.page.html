<landing-page-shell [breadcrumb]="breadcrumb()" align="center">
  <span hero-heading>{{ section() }} is <em>in the works</em>.</span>
  <p hero-lede>{{ blurb() }}</p>
  <p meta-strip>
    <landing-status-dot state="busy" variant="pill" label="In progress" />
  </p>

  <section class="coming-soon-page__body" aria-labelledby="coming-soon-h">
    <landing-container>
      <h2 id="coming-soon-h" class="sr-only">Recovery</h2>

      <div class="coming-soon-page__cursor" aria-hidden="true">
        <span class="coming-soon-page__cursor-glyph">_</span>
      </div>

      <nav class="coming-soon-page__actions" aria-label="Recovery links">
        <landing-link href="/" [arrow]="true">Back to home</landing-link>
        <landing-link href="/projects" [arrow]="true">Browse projects</landing-link>
      </nav>
    </landing-container>
  </section>
</landing-page-shell>
