<landing-ddl-doc-page slug="icon" [sections]="sections">
  <landing-ddl-section anchor="showcase" heading="Showcase">
    <div>
      <p class="font-mono text-mono-md text-landing-text-500 mb-3">landing-icon · all available glyphs</p>
      <div
        class="grid grid-cols-6 tablet:grid-cols-8 laptop:grid-cols-10 gap-3 p-6 bg-ink-0 border border-landing-border rounded"
      >
        @for (name of iconNames; track name) {
          <div class="flex flex-col items-center gap-1.5 p-2 rounded transition-colors hover:bg-landing-border/30">
            <landing-icon [name]="name" class="text-landing-text-300" [size]="22" />
            <span class="font-mono text-mono-sm text-landing-text-500 text-center leading-tight">{{ name }}</span>
          </div>
        }
      </div>
    </div>
  </landing-ddl-section>
</landing-ddl-doc-page>
