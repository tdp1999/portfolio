<landing-section>
  <landing-container>
    <div class="uses-page__head">
      <landing-breadcrumb [items]="breadcrumb" />

      <landing-page-hero [eyebrowLabel]="['01', 'Uses']" align="center">
        <em>Uses</em>.
        <p hero-lede>What I reach for daily — the specific kit, not generic categories.</p>
      </landing-page-hero>
    </div>

    @for (section of sections; track section.id) {
      <landing-content-section [section]="section" class="mb-12" />
    }

    <p class="uses-page__updated">Last updated {{ lastUpdated }}.</p>
  </landing-container>
</landing-section>
