name: Post-Deploy Smoke Test

on:
  push:
    branches: [master]

concurrency:
  group: deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Wait for Railway deploy to propagate
        run: sleep 30

      - name: Smoke test API health endpoint
        run: |
          curl --retry 5 --retry-delay 10 --retry-max-time 120 \
            --retry-all-errors -f \
            "${{ secrets.PRODUCTION_API_URL }}/api/health"

      - name: Smoke test API DB connectivity
        run: |
          curl --retry 3 --retry-delay 5 --retry-max-time 30 \
            --retry-all-errors -f \
            "${{ secrets.PRODUCTION_API_URL }}/api/health/db"
