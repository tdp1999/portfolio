<section id="cta" aria-labelledby="cta-heading" class="cta">
  <landing-container>
    <header class="about-section__head">
      <landing-eyebrow [label]="['04', 'Next steps']" [accentFirst]="true" [trailingRule]="true" />
      <div class="about-section__title-block">
        <landing-heading id="cta-heading" [level]="2" class="about-section__title">
          {{ heading() }}
        </landing-heading>
        <p class="about-section__lede">{{ lede() }}</p>
      </div>
    </header>

    <ul class="cta__list" role="list">
      @for (item of ctas(); track item.id) {
        <li class="cta__item">
          <landing-link
            [href]="item.href"
            [kind]="item.kind ?? null"
            [arrow]="true"
            umamiEvent="about-cta"
            [umamiData]="{ target: item.id }"
          >
            {{ locale() === 'vi' ? item.labelVi : item.labelEn }}
          </landing-link>
        </li>
      }
    </ul>
  </landing-container>
</section>
