        preserveAspectRatio="xMidYMid meet"
        aria-hidden="true"

             endpoints. -->

          d="M 4 8 Q 28 0 52 8 T 100 8 T 148 8 T 196 8 T 244 8 T 292 8 T 340 8 T 388 8 T 436 8 T 484 8 T 532 8 T 580 8 T 628 8 T 676 8 T 724 8 T 756 8"

        />
      </svg>
    </div>
  </landing-container>
</section>
