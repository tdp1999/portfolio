<section id="get-in-touch" class="home-get-in-touch" aria-labelledby="home-get-in-touch-heading">
  <landing-container size="wide">
    <div class="home-get-in-touch__inner">
      <landing-section-header
        [eyebrowLabel]="['06', 'Get in Touch']"
        id="home-get-in-touch-heading"
        class="home-get-in-touch__header"
      >
        Let's <em>talk</em>.
      </landing-section-header>

      <p class="home-get-in-touch__copy">{{ copy() }}</p>

      <div class="home-get-in-touch__ctas">
        @for (cta of ctas(); track cta.purpose) {
          <landing-link
            [href]="'/contact?purpose=' + cta.purpose"
            [arrow]="true"
            [class.home-get-in-touch__cta--quiet]="cta.quiet"
            class="home-get-in-touch__cta"
            umamiEvent="contact-cta"
            [umamiData]="{ purpose: cta.purpose }"
          >
            {{ cta.label }}
          </landing-link>
        }
      </div>

      @if (mailtoHref()) {
        <p class="home-get-in-touch__fallback">
          {{ fallbackPrompt() }}
          <landing-link [href]="mailtoHref()" [inline]="true" umamiEvent="contact-email">{{ email() }}</landing-link>
        </p>
      }
    </div>
  </landing-container>
</section>
