<section class="home-selected-work" aria-labelledby="home-selected-work-heading">
  <landing-container size="wide">
    <header class="home-selected-work__header">
      @if (introHeading()) {
        <landing-section-header
          [eyebrowLabel]="['03', 'Selected Work']"
          align="left"
          id="home-selected-work-heading"
          class="home-selected-work__heading"
        >
          <landing-emphasis-text [text]="introHeading()" />
        </landing-section-header>
      }
      @if (introDeck()) {
        <p class="home-selected-work__deck">{{ introDeck() }}</p>
      }
    </header>

    @if (segments().length > 0 && activeProject(); as project) {
      <landing-segmented
        [segments]="segments()"
        [(active)]="activeId"
        variant="underline"
        idPrefix="selected-work"
        ariaLabel="Selected projects"
        class="home-selected-work__tabs"
      />

      <div
        class="home-selected-work__panel"
        role="tabpanel"
        [attr.id]="'selected-work-panel-' + project.slug"
        [attr.aria-labelledby]="'selected-work-tab-' + project.slug"
      >
        @for (p of [project]; track p.slug) {
          @if (useFallback()) {
            <landing-home-selected-work-fallback [project]="p" [locale]="locale()" />
          } @else {
            <landing-home-selected-work-tab [project]="p" [locale]="locale()" />
          }
        }
      </div>

      <p class="home-selected-work__footer">
        <landing-link href="/projects" [arrow]="true" umamiEvent="work-view-archive">
          View the full archive at /projects
        </landing-link>
      </p>
    } @else {
      <landing-empty-state variant="inline" [message]="emptyMessage()" />
    }
  </landing-container>
</section>
