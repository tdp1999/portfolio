<section class="home-selected-work" aria-labelledby="home-selected-work-heading">
  <landing-container size="wide">
    <header class="home-selected-work__header">
      <landing-eyebrow
        [label]="['03', 'Selected Work']"
        [accentFirst]="true"
        [trailingRule]="true"
        class="home-selected-work__eyebrow"
      />
      @if (introHeading()) {
        <landing-heading
          [level]="2"
          id="home-selected-work-heading"
          [anchor]="false"
          class="home-selected-work__heading"
        >
          {{ introHeading() }}
        </landing-heading>
      }
      @if (introDeck()) {
        <p class="home-selected-work__deck">{{ introDeck() }}</p>
      }
    </header>

    @if (segments().length > 0 && activeProject(); as project) {
      <landing-segmented
        [segments]="segments()"
        [(active)]="activeId"
        variant="underline"
        idPrefix="selected-work"
        ariaLabel="Selected projects"
        class="home-selected-work__tabs"
      />

      <div
        class="home-selected-work__panel"
        role="tabpanel"
        [attr.id]="'selected-work-panel-' + project.slug"
        [attr.aria-labelledby]="'selected-work-tab-' + project.slug"
      >
        @if (useFallback()) {
          <landing-home-selected-work-fallback [project]="project" [locale]="locale()" />
        } @else {
          <landing-home-selected-work-tab [project]="project" [locale]="locale()" />
        }
      </div>

      <p class="home-selected-work__footer">
        <landing-link href="/projects" [arrow]="true">View the full archive at /projects</landing-link>
      </p>
    }
  </landing-container>
</section>
