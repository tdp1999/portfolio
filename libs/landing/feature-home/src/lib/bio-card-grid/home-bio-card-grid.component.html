<section class="bio-grid" aria-labelledby="bio-grid-heading">
  <landing-background pattern="aurora" />

  <landing-container size="wide">
    <header class="bio-grid__head">
      <h2 id="bio-grid-heading" class="sr-only">Who</h2>
      <landing-eyebrow [label]="['02', 'Who']" [accentFirst]="true" [trailingRule]="true" />
    </header>

    <div class="bio-grid__cards">
      <!-- ============================== Card A — IDENTITY ============================== -->
      <landing-card variant="glass" [tilt]="true">
        <landing-eyebrow label="§2.1 IDENTITY" />
        <div class="bio-card__body">
          <p class="font-display text-display-sm text-landing-text-300 leading-tight">{{ fullName() }}</p>
          <p class="font-sans text-body-md text-landing-text-400 mt-1">{{ title() }}</p>
          <dl class="bio-card__rows">
            <div class="bio-card__row">
              <dt class="bio-card__row-key">LOCAL</dt>
              <dd class="bio-card__row-val font-mono">{{ localTime() }} · {{ utcOffset() }}</dd>
            </div>
            <div class="bio-card__row">
              <dt class="bio-card__row-key">HOURS</dt>
              <dd class="bio-card__row-val font-mono">09:00–18:00 ICT</dd>
            </div>
            <div class="bio-card__row">
              <dt class="bio-card__row-key">BASE</dt>
              <dd class="bio-card__row-val font-mono">{{ city() }}</dd>
            </div>
          </dl>
        </div>
      </landing-card>

      <!-- ============================== Card B — OUTLOOK ============================== -->
      <landing-card variant="glass" [tilt]="true">
        <landing-eyebrow label="§2.2 OUTLOOK" />
        <div class="bio-card__body">
          <blockquote class="bio-card__quote font-display text-body-lg text-landing-text-300 italic leading-relaxed">
            "{{ philosophyLead() }} <span class="text-landing-text-200 not-italic">{{ philosophyEmphasis() }}</span
            >"
          </blockquote>
        </div>
      </landing-card>

      <!-- ============================== Card C — CONTACT ============================== -->
      <landing-card variant="glass" [tilt]="true">
        <landing-eyebrow label="§2.3 CONTACT" />
        <div class="bio-card__body">
          <landing-status-dot [state]="statusState()" variant="bare" [label]="statusLabel()" />
          <p class="font-mono text-body-md text-landing-text-300 mt-3 break-all">{{ email() }}</p>
          <p class="font-sans text-body-sm text-landing-text-500 mt-1">{{ contactNote() }}</p>
          <div class="mt-4">
            <landing-link href="#get-in-touch" [arrow]="true">Connect now</landing-link>
          </div>
        </div>
      </landing-card>
    </div>
  </landing-container>
</section>
