<div class="flex flex-col min-h-screen">
  <!-- §2 Hero (B1.e Type + Blueprint Background) -->
  <landing-home-hero
    id="hero"
    [fullName]="fullName()"
    [title]="title()"
    [tagline]="tagline()"
    [city]="locationCity() ?? ''"
    [available]="isOpenToWork()"
    [stackIntro]="stackIntro()"
    [coreStackChips]="coreStack()"
    [profileLoaded]="profileLoaded()"
  />

  <!-- §3 Bio Card Grid — PF2 Aurora Mesh + E3 glow hover (task 284 + improvements pass) -->
  <landing-home-bio-card-grid
    id="who"
    [fullName]="fullName()"
    [title]="title()"
    [city]="locationCity() ?? ''"
    [email]="email()"
    [available]="isOpenToWork()"
    [timezones]="timezones()"
    [workingHours]="workingHours()"
    [philosophyLead]="philosophyLead()"
    [philosophyEmphasis]="philosophyEmphasis()"
    [contactNote]="contactNote()"
    [socialLinks]="socialLinks()"
    [profileLoaded]="profileLoaded()"
  />

  <!-- §4 Selected Work (B3.d Tabbed + Mini Gallery, B2.c lift) -->
  <landing-home-selected-work id="work" [locale]="locale()" [intro]="selectedWorkIntro()" />

  <!-- §5 The Stack — Tier 1 prose + Tier 2 grouped pills (task 285b) -->
  <landing-home-stack id="stack" [stackIntro]="stackIntro()" [groups]="skillGroups()" />

  <!-- §6 The Story — bioLong from API, voice re-questioned 2026-05-04 -->
  <landing-home-intro id="story" [bioLong]="bioLong()" />

  <!-- §6b Philosophy strip — quiet voice transition before §7 lift (task 285) -->
  <landing-home-philosophy-strip [philosophy]="bioShort()" />

  <!-- §7 Get in Touch — B2.c lift (indigo top + tonal surface), task 286 -->
  <landing-home-get-in-touch
    [email]="email()"
    [contactCopy]="contactCopy()"
    [socialLinks]="socialLinks()"
    [resumeUrl]="resumeEntry()?.url ?? ''"
    [resumeName]="resumeEntry()?.name ?? 'CV PDF'"
  />

  <!-- §8 Footer banner + §9 signature line are mounted globally by `landing-shell`. -->

  <!-- Floating pill + minimap nav (in-page wayfinding for long home scroll).
       Hides once the global footer banner enters the viewport so it doesn't
       compete with the signature row. -->
  <landing-floating-pill-nav
    [sections]="navSections"
    [hideWhileActiveIn]="['hero']"
    hideOnSelector="#shell-footer-banner"
  />
</div>
