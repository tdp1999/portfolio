<section class="landing-footer-banner" aria-label="Site map">
  <landing-background pattern="hatch" />
  <landing-container size="wide">
    <div class="landing-footer-banner__inner">
      <div class="landing-footer-banner__grid">
        <!-- Brand block -->
        <div class="landing-footer-banner__brand">
          <brand-wordmark class="landing-footer-banner__wordmark" />
          @if (tagline()) {
            <p class="landing-footer-banner__tagline">{{ tagline() }}</p>
          }
        </div>

        <!-- Nav columns -->
        @for (column of columns; track column.title) {
          <nav class="landing-footer-banner__column" [attr.aria-label]="column.title">
            <landing-eyebrow [label]="column.title" class="landing-footer-banner__column-title" />
            <ul class="landing-footer-banner__list" role="list">
              @for (route of column.routes; track route.href) {
                <li>
                  <landing-link [href]="route.href" umamiEvent="nav-footer" [umamiData]="{ to: route.label }">
                    {{ route.label }}
                  </landing-link>
                </li>
              }
            </ul>
          </nav>
        }
      </div>
    </div>
  </landing-container>
</section>
