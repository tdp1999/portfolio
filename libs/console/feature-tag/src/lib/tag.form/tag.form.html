<div class="tag-form-page">
  <console-spinner-overlay [loading]="loading()" />

  <div class="tag-form-page__header">
    <a mat-icon-button routerLink="/tags" aria-label="Back">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <div>
      <h1 class="text-page-title">{{ isEditMode() ? 'Edit Tag' : 'New Tag' }}</h1>
      <p class="text-body text-text-secondary">Tags label blog posts and projects on the public site.</p>
    </div>
  </div>

  <form [formGroup]="form" [consoleServerErrorMap]="{}" (ngSubmit)="submit()" class="tag-form-page__content">
    <console-section-card
      id="section-details"
      bucket="PUBLIC"
      title="Details"
      description="Tag name. Slug is generated automatically from the name."
      saveMode="atomic"
    >
      <mat-form-field>
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" placeholder="e.g. typescript" />
        <mat-error>{{ form.controls.name | formError }}</mat-error>
      </mat-form-field>
    </console-section-card>

    <button type="submit" class="hidden" aria-hidden="true"></button>
  </form>

  <console-sticky-save-bar [dirty]="dirty" [saving]="submitting" (save)="submit()" (discard)="discard()" />
</div>
