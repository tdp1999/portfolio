<div class="detail-page">
  @if (tag(); as t) {
    <!-- Header: back + entity name + status badge, actions (full) on the right. -->
    <div class="console-page-header">
      <a mat-icon-button routerLink="/tags" aria-label="Back to tags">
        <mat-icon>arrow_back</mat-icon>
      </a>
      <div class="console-page-header__titles">
        <div class="flex items-center gap-2">
          <h1 class="text-page-title">{{ t.name }}</h1>
          @if (t.deletedAt) {
            <span class="console-badge console-badge--danger">Deleted</span>
          }
        </div>
        <div class="detail-meta">
          <span>Created {{ t.createdAt | date: 'medium' }}</span>
          <span>Updated {{ t.updatedAt | date: 'medium' }}</span>
          @if (t.deletedAt) {
            <span class="text-red-400">Deleted {{ t.deletedAt | date: 'medium' }}</span>
          }
        </div>
      </div>
      <div class="console-page-header__actions">
        <a mat-flat-button color="primary" routerLink="./edit">
          <mat-icon class="icon-sm">edit</mat-icon>
          Edit
        </a>
        @if (!t.deletedAt) {
          <button mat-stroked-button color="warn" (click)="confirmDelete()">
            <mat-icon class="icon-sm">delete</mat-icon>
            Delete
          </button>
        }
      </div>
    </div>

    <div class="detail-card mt-4">
      <div class="detail-section">
        <div class="detail-field">
          <span class="detail-field__label">Slug</span>
          <span class="detail-field__value font-mono text-sm">{{ t.slug }}</span>
        </div>
      </div>
    </div>
  } @else {
    <div class="detail-content relative">
      <console-spinner-overlay [loading]="loading()" />
    </div>
  }
</div>
