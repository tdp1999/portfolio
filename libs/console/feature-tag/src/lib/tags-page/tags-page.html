<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-text">Tag Management</h1>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      Create Tag
    </button>
  </div>

  <console-filter-bar>
    <console-filter-search
      label="Search tags"
      placeholder="Search by name..."
      (searchChange)="onSearchChange($event)"
    />
  </console-filter-bar>

  <div class="relative">
    <console-spinner-overlay [loading]="loading()" />

    <div class="overflow-x-auto">
      <table mat-table [dataSource]="tags()" class="w-full">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let tag">
            {{ tag.name }}
          </td>
        </ng-container>

        <!-- Slug Column -->
        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let tag" class="text-text-muted">
            {{ tag.slug }}
          </td>
        </ng-container>

        <!-- Created Date Column -->
        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef>Created</th>
          <td mat-cell *matCellDef="let tag">
            {{ tag.createdAt | date: 'mediumDate' }}
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let tag">
            <button mat-icon-button matTooltip="Edit tag" (click)="openEditDialog(tag)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Delete tag" (click)="confirmDelete(tag)">
              <mat-icon class="text-red-500">delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- No data row -->
        <tr class="mat-mdc-row" *matNoDataRow>
          <td class="mat-mdc-cell py-8 text-center text-text-muted" [attr.colspan]="displayedColumns.length">
            No tags found
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator
      [length]="total()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[20, 50, 100]"
      (page)="onPage($event)"
      showFirstLastButtons
    />
  </div>
</div>
