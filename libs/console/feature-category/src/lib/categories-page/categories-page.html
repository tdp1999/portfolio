<div class="max-w-5xl">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold text-text">Category Management</h1>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      Create Category
    </button>
  </div>

  <console-filter-bar>
    <console-filter-search
      label="Search categories"
      placeholder="Search by name..."
      (searchChange)="onSearchChange($event)"
    />
  </console-filter-bar>

  <div class="relative">
    <console-spinner-overlay [loading]="loading()" />

    <div class="overflow-x-auto">
      <table mat-table [dataSource]="categories()" class="w-full">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let category">
            {{ category.name }}
          </td>
        </ng-container>

        <!-- Slug Column -->
        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let category" class="text-text-muted">
            {{ category.slug }}
          </td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let category" class="text-text-muted max-w-[200px] truncate">
            {{ category.description ?? '—' }}
          </td>
        </ng-container>

        <!-- Display Order Column -->
        <ng-container matColumnDef="displayOrder">
          <th mat-header-cell *matHeaderCellDef>Order</th>
          <td mat-cell *matCellDef="let category">
            {{ category.displayOrder }}
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let category">
            <button mat-icon-button matTooltip="Edit category" (click)="openEditDialog(category)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Delete category" (click)="confirmDelete(category)">
              <mat-icon class="text-red-500">delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- No data row -->
        <tr class="mat-mdc-row" *matNoDataRow>
          <td class="mat-mdc-cell py-8 text-center text-text-muted" [attr.colspan]="displayedColumns.length">
            No categories found
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator
      [length]="total()"
      [pageIndex]="pageIndex()"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[20, 50, 100]"
      (page)="onPage($event)"
      showFirstLastButtons
    />
  </div>
</div>
