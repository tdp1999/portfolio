<div class="chip-row" role="group">
  @for (opt of options(); track opt.value) {
    <mat-chip-option
      [selected]="selected().has(opt.value)"
      [disabled]="disabled()"
      [attr.aria-pressed]="selected().has(opt.value)"
      (click)="toggle(opt.value)"
    >
      {{ opt.label }}
    </mat-chip-option>
  }
</div>
