<nav class="scrollspy-rail" aria-label="Page sections">
  @if (title()) {
    <div class="scrollspy-rail__title">{{ title() }}</div>
  }
  @for (section of sections(); track section.id) {
    <button
      class="scrollspy-rail__item"
      [class.scrollspy-rail__item--active]="activeIndicator() && activeId() === section.id"
      [attr.aria-current]="activeIndicator() && activeId() === section.id ? 'true' : null"
      (click)="scrollTo(section.id)"
      type="button"
    >
      @if (resolveStatus(section); as status) {
        <span
          class="scrollspy-rail__icon"
          [class.scrollspy-rail__icon--saved]="status === 'saved'"
          [class.scrollspy-rail__icon--editing]="status === 'editing'"
          [class.scrollspy-rail__icon--error]="status === 'error'"
        >
          {{ statusIcon(status) }}
        </span>
      }
      <span class="scrollspy-rail__label">{{ section.label }}</span>
    </button>
  }
</nav>
