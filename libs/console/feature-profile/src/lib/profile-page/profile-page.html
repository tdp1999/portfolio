<div class="profile-page">
  <console-spinner-overlay [loading]="loading()" />

  <div class="profile-page__header">
    <div>
      <h1 class="text-page-title">Profile Settings</h1>
      <p class="text-body text-text-secondary">Manage your public profile. Each section saves independently.</p>
    </div>
  </div>

  <console-long-form-layout>
    <div rail>
      <console-scrollspy-rail title="Profile Settings" [sections]="sections" />
    </div>

    <div content class="flex flex-col gap-8">
      <console-profile-identity-section
        [initialData]="profile()"
        [mediaDataSource]="mediaDataSource"
        (saved)="onSectionSaved($event)"
      />

      <console-profile-work-availability-section [initialData]="profile()" (saved)="onSectionSaved($event)" />

      <console-profile-contact-section [initialData]="profile()" (saved)="onSectionSaved($event)" />

      <console-profile-location-section [initialData]="profile()" (saved)="onSectionSaved($event)" />

      <console-profile-social-links-section
        [initialData]="profile()"
        [mediaDataSource]="mediaDataSource"
        (saved)="onSectionSaved($event)"
      />

      <console-profile-seo-og-section
        [initialData]="profile()"
        [mediaDataSource]="mediaDataSource"
        (saved)="onSectionSaved($event)"
      />

      <console-profile-admin-contact-address-section [initialData]="profile()" (saved)="onSectionSaved($event)" />
    </div>
  </console-long-form-layout>
</div>
