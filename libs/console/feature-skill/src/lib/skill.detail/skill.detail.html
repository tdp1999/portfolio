<div class="detail-page">
  <div class="detail-header">
    <a mat-icon-button routerLink="/skills" aria-label="Back to skills">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <h1 class="text-page-title ml-2">Skill</h1>
  </div>

  <div class="detail-content relative">
    <console-spinner-overlay [loading]="loading()" />

    @if (skill(); as s) {
      <div class="detail-actions">
        <a mat-stroked-button routerLink="./edit">
          <mat-icon class="icon-sm">edit</mat-icon>
          Edit
        </a>
        @if (!s.deletedAt) {
          <button mat-stroked-button color="warn" (click)="confirmDelete()">
            <mat-icon class="icon-sm">delete</mat-icon>
            Delete
          </button>
        }
      </div>

      <console-skill-detail-card
        class="mt-4 block"
        [skill]="s"
        [parent]="parent()"
        [children]="children()"
        (skillSelect)="goToSkill($event)"
      />
    }
  </div>
</div>
