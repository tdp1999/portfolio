<h2 class="text-xl font-semibold text-text">Change password</h2>
<p class="mt-1 text-sm text-text-muted">Update your account password.</p>

<form [formGroup]="form" [consoleServerErrorMap]="{}" (ngSubmit)="onSubmit()" class="mt-6 max-w-md space-y-4">
  <!-- Current Password -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Current password</mat-label>
    <input
      matInput
      [type]="showCurrentPassword() ? 'text' : 'password'"
      formControlName="currentPassword"
      autocomplete="current-password"
    />
    <button
      mat-icon-button
      matSuffix
      type="button"
      (click)="toggleCurrentPassword()"
      [attr.aria-label]="showCurrentPassword() ? 'Hide password' : 'Show password'"
    >
      <mat-icon>{{ showCurrentPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    <mat-error>{{ form.controls.currentPassword | formError }}</mat-error>
  </mat-form-field>

  <!-- New Password -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>New password</mat-label>
    <input
      matInput
      [type]="showNewPassword() ? 'text' : 'password'"
      formControlName="newPassword"
      autocomplete="new-password"
    />
    <button
      mat-icon-button
      matSuffix
      type="button"
      (click)="toggleNewPassword()"
      [attr.aria-label]="showNewPassword() ? 'Hide password' : 'Show password'"
    >
      <mat-icon>{{ showNewPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    <mat-error>{{ form.controls.newPassword | formError }}</mat-error>
  </mat-form-field>

  <!-- Confirm Password -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Confirm new password</mat-label>
    <input
      matInput
      [type]="showConfirmPassword() ? 'text' : 'password'"
      formControlName="confirmPassword"
      autocomplete="new-password"
    />
    <button
      mat-icon-button
      matSuffix
      type="button"
      (click)="toggleConfirmPassword()"
      [attr.aria-label]="showConfirmPassword() ? 'Hide password' : 'Show password'"
    >
      <mat-icon>{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    <mat-error>{{
      form.controls.confirmPassword | formError: { passwordsMismatch: 'Passwords do not match.' } : form
    }}</mat-error>
  </mat-form-field>

  <button mat-flat-button type="submit" [disabled]="submitting()" class="w-full">
    @if (submitting()) {
      <mat-spinner diameter="18" class="inline-block mr-2"></mat-spinner>
      Changing…
    } @else {
      Change password
    }
  </button>
</form>
